
services:
  hunter_core:
    build:
      context: .
      dockerfile: docker/Dockerfile
    
    image: hunter_drone:v1.2
    container_name: hunter_drone_container
    
    network_mode: "host"
    privileged: true
    stdin_open: true
    tty: true

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, display, graphics, compute, utility]
    
    devices:
      - /dev/dxg:/dev/dxg
      - /dev/dri/card0:/dev/dri/card0
      - /dev/dri/renderD128:/dev/dri/renderD128

    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}
      - ROS_DOMAIN_ID=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - PX4_SIM_MODEL=iris_depth_camera
      - LIBGL_ALWAYS_INDIRECT=0
      - LD_LIBRARY_PATH=/usr/lib/wsl/lib
      - LIBVA_DRIVER_NAME=d3d12
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /mnt/wslg:/mnt/wslg:ro
      - /usr/lib/wsl:/usr/lib/wsl:ro
      - ./src:/root/hunter_ws/src:rw
      - ./.git:/root/hunter_ws/.git:rw
      - px4_build_cache:/root/hunter_ws/src/PX4-Autopilot/build
    command: tail -f /dev/null

volumes:
  px4_build_cache: